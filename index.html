<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fila de Closers Mercadinho do Seo Juca</title>

<style>
:root {
  --accent: #033517;
  --bg: #f5f4f0;
}

body {
  font-family: Arial, sans-serif;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 380px;
  text-align: center;
}

h1 {
  font-size: 18px;
  margin-bottom: 20px;
}

.closer {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 20px;
}

label {
  font-size: 12px;
  display: block;
  text-align: left;
  margin-top: 8px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 8px;
  border: 1px solid #ddd;
  border-radius: 6px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  cursor: pointer;
  border-radius: 6px;
  margin-top: 5px;
}

.primary {
  background: var(--accent);
  color: white;
}

.secondary {
  background: #eee;
}
</style>
</head>

<body>

<div class="card">

  <h1>Fila de Closers<br>Mercadinho do Seo Juca</h1>

  <div class="closer" id="closer">Carregando...</div>

  <label>SDR</label>
  <select id="sdr"></select>

  <label>Nome do Lead</label>
  <input id="lead" placeholder="Digite o nome do Lead">

  <label>Data da Reunião</label>
  <input type="date" id="data_reuniao">

  <button class="secondary" onclick="nextCloser()">Pular</button>
  <button class="primary" onclick="agendar()">Reunião Agendada</button>

</div>

<script>

const CLOSERS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQXQEJMybM1mJ2X-Mf_EzgrCBoLt_t7leS7yI1cw_C2_g_iAc19TjHypB69AlKmR9v5Ay5Nn8g6G55o/pub?output=csv";
const SDR_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQXQEJMybM1mJ2X-Mf_EzgrCBoLt_t7leS7yI1cw_C2_g_iAc19TjHypB69AlKmR9v5Ay5Nn8g6G55o/pub?gid=1360192723&output=csv";
const WEBHOOK_URL = "https://hook.us2.make.com/xh4sxhoftr8gyemrd18rjw9brksguzda";

let closers = [];
let sdrs = [];
let index = 0;

// carregar closers
async function loadClosers() {
  const res = await fetch(CLOSERS_URL);
  const text = await res.text();

  closers = text.split("\n")
    .slice(1)
    .map(l => l.replace(/"/g,"").trim())
    .filter(l => l);

  render();
}

// carregar SDRs
async function loadSDRs() {
  const res = await fetch(SDR_URL);
  const text = await res.text();

  sdrs = text.split("\n")
    .slice(1)
    .map(l => l.replace(/"/g,"").trim())
    .filter(l => l);

  const select = document.getElementById("sdr");

  select.innerHTML = `
    <option value="">Selecione um SDR</option>
    ${sdrs.map(s => `<option value="${s}">${s}</option>`).join("")}
  `;
}

// render closer atual
function render() {
  const el = document.getElementById("closer");

  if (!closers.length) {
    el.innerText = "Sem closers";
    return;
  }

  el.innerText = closers[index % closers.length];
}

// próximo closer
function nextCloser() {
  index++;
  render();
}

// agendar reunião
async function agendar() {
  const sdr = document.getElementById("sdr").value;
  const lead = document.getElementById("lead").value.trim();
  const dataReuniao = document.getElementById("data_reuniao").value;

  if (!sdr || !lead || !dataReuniao) {
    alert("Preencha todos os campos");
    return;
  }

  const closer = closers[index % closers.length];

  try {
    await fetch(WEBHOOK_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        closer: closer,
        sdr: sdr,
        lead: lead,
        data_reuniao: dataReuniao
      })
    });

    document.getElementById("lead").value = "";

    index++;
    render();

    alert("Reunião registrada com sucesso!");

  } catch (err) {
    alert("Erro ao enviar dados");
    console.error(err);
  }
}

// init
loadClosers();
loadSDRs();

</script>

</body>
</html>
